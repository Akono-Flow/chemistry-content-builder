                                id: 'block_' + Date.now() + '_' + Math.random(),
                                type: 'image',
                                content: '',
                                metadata: {
                                    dataUrl: node.src,
                                    caption: node.alt || ''
                                }
                            });
                        } else if (tagName === 'table') {
                            const tableData = [];
                            const rows = node.querySelectorAll('tr');
                            rows.forEach(row => {
                                const rowData = [];
                                const cells = row.querySelectorAll('th, td');
                                cells.forEach(cell => {
                                    rowData.push(cell.textContent.trim());
                                });
                                if (rowData.length > 0) {
                                    tableData.push(rowData);
                                }
                            });
                            if (tableData.length > 0) {
                                blocks.push({
                                    id: 'block_' + Date.now() + '_' + Math.random(),
                                    type: 'table',
                                    content: tableData,
                                    metadata: {}
                                });
                            }
                        } else if (tagName === 'hr') {
                            blocks.push({
                                id: 'block_' + Date.now() + '_' + Math.random(),
                                type: 'divider',
                                content: '',
                                metadata: {}
                            });
                        } else if (tagName === 'div') {
                            // Check if it's a callout/example box
                            if (node.className.includes('example') || node.className.includes('callout')) {
                                const titleElement = node.querySelector('.example-title, .callout-title');
                                const title = titleElement ? titleElement.textContent.trim() : '';
                                const content = node.textContent.replace(title, '').trim();
                                
                                blocks.push({
                                    id: 'block_' + Date.now() + '_' + Math.random(),
                                    type: 'callout',
                                    content: content,
                                    metadata: {
                                        variant: node.className.includes('example') ? 'example' : 'info',
                                        title: title
                                    }
                                });
                            } else {
                                // Process children
                                Array.from(node.childNodes).forEach(processNode);
                            }
                        } else {
                            // Process children for other tags
                            Array.from(node.childNodes).forEach(processNode);
                        }
                    }
                };

                Array.from(tempDiv.childNodes).forEach(processNode);

                return blocks;
            },

            // Storage
            saveToStorage() {
                localStorage.setItem('chemContentBuilder', JSON.stringify(this.data));
            },

            loadFromStorage() {
                const saved = localStorage.getItem('chemContentBuilder');
                if (saved) {
                    this.data = JSON.parse(saved);
                }
            },

            // Helpers
            showToast(message, type = 'success') {
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                toast.textContent = message;
                document.body.appendChild(toast);

                setTimeout(() => {
                    toast.remove();
                }, 3000);
            }
        };

        // Initialize app
        document.addEventListener('DOMContentLoaded', () => {
            app.init();
        });
    </script>
</body>
